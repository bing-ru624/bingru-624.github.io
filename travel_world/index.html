    <h2 id="我去過的地方"><a href="#我去過的地方" class="headerlink" title="我去過的地方"></a>我去過的地方</h2><div id="map" style="width: 100%; height: 600px;"></div>

<ul id="country-list"></ul> <!-- 添加一個列表來顯示國家名稱 -->

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>

<script>
  // 設置地圖尺寸和投影
  var width = 960;
  var height = 600;

  var projection = d3.geoMercator()
                     .scale(150)
                     .translate([width / 2, height / 2]);

  var path = d3.geoPath().projection(projection);

  var svg = d3.select("#map").append("svg")
              .attr("width", width)
              .attr("height", height);

  // 加入縮放和拖拽行為
  var zoom = d3.zoom()
               .scaleExtent([1, 8])
               .on("zoom", zoomed);

  svg.call(zoom);

  // 加載地圖數據並繪製地圖
  d3.json("https://d3js.org/world-110m.v1.json").then(function(world) {
    var countries = topojson.feature(world, world.objects.countries).features;

    var g = svg.append("g");

    // 定義已去過的國家
    var visitedCountries = {
      "United Kingdom": "#ffcc00", // 英國
      "France": "#ffcc00"          // 法國
      // 添加更多國家
    };

    // 創建一個列表元素來顯示國家名稱
    var countryList = d3.select("#country-list");

    // 將每個國家標記上顏色並添加到列表中
    g.selectAll("path")
       .data(countries)
       .enter().append("path")
       .attr("d", path)
       .attr("fill", function(d) {
          var countryName = d.properties.name;
          // 添加國家名稱到列表中
          countryList.append("li").text(countryName);
          return visitedCountries[countryName] || "#ccc";
       })
       .attr("stroke", "#333");

    // 添加標註點
    var cities = [
      { name: "London", coordinates: [-0.1276, 51.5074] },
      { name: "Paris", coordinates: [2.3522, 48.8566] }
      // 添加更多城市
    ];

    g.selectAll("circle")
       .data(cities)
       .enter().append("circle")
       .attr("cx", function(d) { return projection(d.coordinates)[0]; })
       .attr("cy", function(d) { return projection(d.coordinates)[1]; })
       .attr("r", 5)
       .attr("fill", "red");

    g.selectAll("text")
       .data(cities)
       .enter().append("text")
       .attr("x", function(d) { return projection(d.coordinates)[0] + 5; })
       .attr("y", function(d) { return projection(d.coordinates)[1]; })
       .text(function(d) { return d.name; })
       .attr("font-size", "12px")
       .attr("fill", "black");
  });

  function zoomed(event) {
    svg.selectAll('g')
       .attr("transform", event.transform);
  }
</script>
